name: Website Preview

on:
  pull_request:
    branches:
      - main
    paths:
      - "website/**"
      - "docs/**"
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile
        working-directory: docs

      - name: Resolve version
        run: |
          LATEST=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | jq -r '.tag_name')
          echo "VERSION=${LATEST}" >> $GITHUB_ENV

      - name: Inject version into HTML
        run: |
          sed -i "s/{{VERSION}}/${{ env.VERSION }}/g" website/*.html

      - name: Minify HTML
        run: |
          npx html-minifier-terser \
            --input-dir website \
            --output-dir website \
            --file-ext html \
            --collapse-whitespace \
            --remove-comments \
            --remove-redundant-attributes \
            --remove-script-type-attributes \
            --remove-style-link-type-attributes \
            --minify-css true \
            --minify-js true

      - name: Build docs
        run: pnpm build
        working-directory: docs

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website --project-name=app-switcher --commit-dirty=true --branch=pr-${{ github.event.pull_request.number }}

      - name: Comment preview URL on PR
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentUrl = '${{ steps.deploy.outputs.deployment-url }}';
            const aliasUrl = '${{ steps.deploy.outputs.pages-deployment-alias-url }}';
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const body = [
              '## 🚀 Website Preview',
              '',
              '| | |',
              '|---|---|',
              `| **Preview URL** | ${deploymentUrl} |`,
              `| **Alias URL** | ${aliasUrl} |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Updated** | ${new Date().toUTCString()} |`,
              '',
              '_This comment is updated automatically on each push._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## 🚀 Website Preview';
            const existing = comments.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fork PR notice
        if: ${{ github.event.pull_request.head.repo.fork }}
        run: echo "Fork PR detected; skipping Cloudflare deploy and PR comment because repository secrets are unavailable."
