name: Publish Release

permissions:
  contents: read

on:
  release:
    types: [published]

jobs:
  push-chocolatey:
    if: ${{ vars.ENABLE_CHOCO_PUSH == 'true' }}
    runs-on: windows-latest

    steps:
      - name: Read version
        run: |
          "ver=$($env:GITHUB_REF_NAME -replace '^v', '')" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Download Chocolatey package from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$env:GITHUB_REF_NAME" --pattern "*.nupkg" --repo "${{ github.repository }}"

      - name: Push Chocolatey package
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          choco push "ipatalas-appswitcher.$($env:ver).nupkg" --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY

  trigger-scoop-update:
    if: ${{ vars.ENABLE_SCOOP_UPDATE == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Scoop update workflow
        run: |
          gh workflow run excavator.yml --repo "ipatalas/scoop-bucket" --ref main
        env:
          GH_TOKEN: ${{ secrets.SCOOP_TRIGGER_TOKEN }}

  push-winget:
    if: ${{ vars.ENABLE_WINGET_UPDATE == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: ipatalas.AppSwitcher
          max-versions-to-keep: 5
          token: ${{ secrets.WINGET_GITHUB_TOKEN }}

  deploy-website:
    uses: ./.github/workflows/website.yml
    secrets: inherit
