name: Publish Release

permissions:
  contents: write

on:
  release:
    types: [published]

jobs:
  push-chocolatey:
    runs-on: windows-latest

    steps:
      - name: Read version
        run: |
          "ver=$($env:GITHUB_REF_NAME -replace '^v', '')" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Download Chocolatey package from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$env:GITHUB_REF_NAME" --pattern "*.nupkg" --repo "${{ github.repository }}"

      - name: Push Chocolatey package
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          choco push "ipatalas-appswitcher.$($env:ver).nupkg" --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY

  deploy-website:
    needs: push-chocolatey
    uses: ./.github/workflows/website.yml
    secrets: inherit
