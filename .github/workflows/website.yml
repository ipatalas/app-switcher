name: Deploy Website

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile
        working-directory: docs

      - name: Resolve version
        run: |
          LATEST=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | jq -r '.tag_name')
          echo "VERSION=${LATEST}" >> $GITHUB_ENV

      - name: Inject version into HTML
        run: |
          sed -i "s/{{VERSION}}/${{ env.VERSION }}/g" website/*.html

      - name: Minify HTML
        run: |
          npx html-minifier-terser \
            --input-dir website \
            --output-dir website \
            --file-ext html \
            --collapse-whitespace \
            --remove-comments \
            --remove-redundant-attributes \
            --remove-script-type-attributes \
            --remove-style-link-type-attributes \
            --minify-css true \
            --minify-js true

      # Build docs after minification to avoid issues (Astro already does it differently)
      - name: Build docs
        run: pnpm build
        working-directory: docs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website --project-name=app-switcher --commit-dirty=true --branch=main
